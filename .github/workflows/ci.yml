name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TAURI_SIGNING_PRIVATE_KEY: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format (macOS ARM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-${{ runner.os }}-cargo-
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install frontend dependencies
        run: npm ci
      - name: Check Rust formatting
        run: cargo fmt --all --check
      - name: Run Clippy (zero warnings policy)
        run: cargo clippy --workspace -- -D warnings

  build-macos:
    name: Build & Test (macOS ARM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: build-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-macos-
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install frontend dependencies
        run: npm ci
      - name: Build workspace
        run: cargo build --workspace --target aarch64-apple-darwin
      - name: Run tests
        run: cargo test --workspace --target aarch64-apple-darwin

  build-windows:
    name: Build & Test (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: build-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-windows-
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install frontend dependencies
        run: npm ci
      - name: Build workspace
        run: cargo build --workspace --target x86_64-pc-windows-msvc
      - name: Run tests
        run: cargo test --workspace --target x86_64-pc-windows-msvc

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}