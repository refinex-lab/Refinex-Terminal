# Refinex Terminal — Cargo configuration
# https://doc.rust-lang.org/cargo/reference/config.html

# ─────────────────────────────────────────────
# Registry mirrors (国内加速，按需启用)
# 取消注释以下任意一个镜像来加速 crates.io 下载
# ─────────────────────────────────────────────

# 镜像方案 A：rsproxy.cn（字节跳动，推荐）
# [source.crates-io]
# replace-with = "rsproxy"
#
# [source.rsproxy]
# registry = "https://rsproxy.cn/crates.io-index"
#
# [source.rsproxy-sparse]
# registry = "sparse+https://rsproxy.cn/index/"
#
# [registries.rsproxy]
# index = "https://rsproxy.cn/crates.io-index"

# 镜像方案 B：USTC（中科大）
# [source.crates-io]
# replace-with = "ustc"
#
# [source.ustc]
# registry = "sparse+https://mirrors.ustc.edu.cn/crates.io-index"

# ─────────────────────────────────────────────
# Build optimisation
# ─────────────────────────────────────────────

[build]
# Use all available logical cores by default
# jobs = 0   # 0 = number of logical CPUs (Cargo default since 1.72)

# Share incremental build artefacts across workspaces
incremental = true

[profile.dev]
# Optimise dependencies in dev builds for a snappier dev loop
# (avoids 10× slowdowns from unoptimised regex / serde / tauri at startup)
[profile.dev.package."*"]
opt-level = 2

[profile.release]
# Standard release: optimise for speed, strip debug info
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"

# ─────────────────────────────────────────────
# Linker tweaks (macOS ARM — Apple Silicon)
# ─────────────────────────────────────────────

[target.aarch64-apple-darwin]
# Use the system linker; no extra flags needed on Apple Silicon
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.x86_64-pc-windows-msvc]
# Subsystem flag handled by #![windows_subsystem] in main.rs; no extra flags
rustflags = []
